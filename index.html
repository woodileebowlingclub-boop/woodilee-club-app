<!doctype html>
<html>
<head>
  <title>Woodilee Bowling Club</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th {
      background: orange;
      color: white;
    }
  </style>
</head>

<body>

<h1>Woodilee Bowling Club</h1>
<h2>Monday Points Leaderboard</h2>

<table id="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Total</th>
      <th>Position</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const data = [
  { name: "Trevor", points: 12 },
  { name: "Peter", points: 8 },
  { name: "Willie", points: 15 },
  { name: "Charlie", points: 6 }
];

data.sort((a,b) => b.points - a.points);

const tbody = document.querySelector("tbody");

data.forEach((p, i) => {
  const row = `
    <tr>
      <td>${p.name}</td>
      <td>${p.points}</td>
      <td>${i+1}</td>
    </tr>
  `;
  tbody.innerHTML += row;
});
</script>

</body>
</html>
